.chat-area {

@keyframes pulse {

function normalize(text) {
    if (!text) return "";
    return text.toLowerCase().replace(/[^\u0600-\u06FF\s]/g, "").replace(/ة/g, "ه").replace(/ى/g, "ي").trim();
}

function similarity(a, b) {
    let matches = 0;
    for (let i = 0; i < Math.min(a.length, b.length); i++) { if (a[i] === b[i]) matches++; }
    return matches / Math.max(a.length, b.length);
}

function detectIntent(text) {
    const norm = normalize(text);
    if (norm.includes("ازاي") || norm.includes("ورق") || norm.includes("خطوات") || norm.includes("اعمل") || norm.includes("بكام")) return "action";
    if (norm.includes("فين") || norm.includes("عنوان") || norm.includes("مكان") || norm.includes("اروح")) return "location";
    if (norm.includes("امتي") || norm.includes("مواعيد") || norm.includes("وقت") || norm.includes("شغالين")) return "time";
    return "normal";
}

function showAllServices() {
    let html = `📋 <b>كل الخدمات المتاحة في المنطقة:</b><br><br>`;
    for (let s in services) {
        html += `<button class="option-btn" onclick="selectService('${s}', '')">${s}</button>`;
    }
    addMessage(html, "bot");
}

function detectServices(text) {
    const normText = normalize(text);
    if (!normText) return [];

    if (["جمعه", "عيد", "اجازه", "طوارئ"].some(w => normText.includes(w))) {
        return [{ name: "خدمات الطوارئ", score: 100 }];
    }

    let results = [];
    for (let s in services) {
        let score = 0;
        let hasExactMatch = false;

        services[s].keywords.forEach(key => {
            const normKey = normalize(key);
            if (normText.includes(normKey)) {
                score += 100; 
                hasExactMatch = true;
            }
            if (!hasExactMatch) {
                normText.split(" ").forEach(word => {
                    if (word.length >= 4) {
                        let sim = similarity(word, normKey);
                        if (sim > 0.85) {
                            score += 10;
                        }
                    }
                });
            }
        });
        if (score > 0) results.push({ name: s, score: score });
    }
    results.sort((a, b) => b.score - a.score);
    if (results.length > 1) {
        const topScore = results[0].score;
        return results.filter(r => r.score >= topScore * 0.9);
    }
    return results;
}

            });

            addMessage(html, "bot");
        } else if (matches.length === 1) {
            selectService(matches[0].name, text);
        } else {
            addMessage(`🤔 مش متأكد تماماً من طلبك.. <br><button class="all-services-btn" onclick="showAllServices()">📋 اضغط هنا لعرض كل الخدمات</button>`, "bot");
        }
    }, 1000);
}

function selectService(name, originalText) {
    addMessage(name, "user");
    
    const s = services[name];
    const norm = originalText ? normalize(originalText) : "";
    let extra = "";
    if (norm.includes("ازاي") || norm.includes("ورق")) extra = "📄 <b>بخصوص الأوراق والخطوات:</b><br>";
    else if (norm.includes("فين") || norm.includes("عنوان")) extra = "📍 <b>بخصوص المكان والموقع:</b><br>";
    else if (norm.includes("امتي") || norm.includes("مواعيد")) extra = "⏰ <b>بخصوص المواعيد:</b><br>";

    setTimeout(() => { 
        let mainResponse = `${extra}${s.msg}`;
        if (s.link) {
            mainResponse += `<br><a href="${s.link}" target="_blank" class="btn-link">فتح خدمة ${name}</a>`;
        }
        addMessage(mainResponse, "bot"); 
        
        setTimeout(() => {
            const fallbackMsg = `لو مش ده اللي تقصده.. تقدر تتصفح كل خدماتنا وتختار الخدمة بسهولة من هنا 👇<br><button class="all-services-btn" onclick="showAllServices()">📋 عرض كل الخدمات</button>`;
            addMessage(fallbackMsg, "bot");
        }, 1200);
    }, 600);
}

function addMessage(text, type) {
    let chat = document.getElementById("chatArea");
    let div = document.createElement("div");
    div.className = "msg " + (type === "user" ? "user-msg" : "bot-msg");
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
    let chat = document.getElementById("chatArea");
    let div = document.createElement("div");
    div.id = "typing";
    div.className = "msg bot-msg typing";
    div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function removeTyping() { 
    let t = document.getElementById("typing"); 
    if (t) t.remove(); 
}

document.getElementById("userInput").addEventListener("keydown", (e) => { 
    if (e.key === "Enter") handleSend(); 
});
</script>
</body>
</html>
