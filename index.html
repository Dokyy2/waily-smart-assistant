<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waily Digital Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary-color: #2563eb;
    --accent-color: #3b82f6;
    --bg-dark: #0f172a;
    --glass-bg: rgba(255, 255, 255, 0.92);
}

* { box-sizing: border-box; }

body {
    margin: 0;
    direction: rtl;
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(-45deg, #0f172a, #1e293b, #2563eb, #1e293b);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

.chat-container {
    width: 100%;
    max-width: 450px;
    height: 90vh;
    background: var(--glass-bg);
    backdrop-filter: blur(15px);
    border-radius: 30px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.3);
    animation: slideUp 0.8s ease-out;
}

.header {
    padding: 20px;
    text-align: center;
    background: white;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    font-weight: 700;
    color: #1e293b;
    font-size: 1.1rem;
    position: relative;
}

.header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 25%; width: 50%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
}

.chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    background: rgba(248, 250, 252, 0.4);
}

@keyframes msgPop {
    from { opacity: 0; transform: scale(0.9) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}

.msg {
    max-width: 85%;
    padding: 14px 18px;
    border-radius: 20px;
    line-height: 1.6;
    font-size: 0.95rem;
    animation: msgPop 0.3s ease forwards;
    position: relative;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

.bot-msg {
    background: white;
    color: #334155;
    align-self: flex-start;
    border-bottom-right-radius: 5px;
}

.user-msg {
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white;
    align-self: flex-end;
    border-bottom-left-radius: 5px;
}

.btn-link {
    display: block;
    margin-top: 12px;
    background: white;
    color: var(--primary-color);
    text-decoration: none;
    padding: 10px;
    border-radius: 12px;
    text-align: center;
    font-weight: 700;
    border: 2px solid var(--primary-color);
    transition: all 0.3s;
}

.btn-link:hover {
    background: var(--primary-color);
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
}

.input-group {
    display: flex;
    padding: 20px;
    background: white;
    gap: 12px;
}

input {
    flex: 1;
    padding: 14px 20px;
    border-radius: 15px;
    border: 2px solid #f1f5f9;
    outline: none;
    font-family: inherit;
    transition: 0.3s;
}

input:focus {
    border-color: var(--primary-color);
    background: #f8fafc;
}

button {
    background: var(--primary-color);
    color: white;
    border: none;
    border-radius: 15px;
    padding: 0 25px;
    cursor: pointer;
    font-weight: 700;
    transition: 0.3s;
}

button:hover {
    background: #1d4ed8;
    transform: scale(1.05);
}

.typing {
    display: flex;
    gap: 4px;
    padding: 15px 20px !important;
}

.dot {
    width: 6px; height: 6px; background: #94a3b8;
    border-radius: 50%; animation: blink 1.4s infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
</style>
</head>

<body>

<div class="chat-container">

    <div class="header">
        🤖 المساعد الرقمي - الدمرداش والوايلي
    </div>

    <div id="chatArea" class="chat-area">
        <div class="msg bot-msg">
            أهلاً بك 👋<br>
            أنا هنا لمساعدتك في الوصول لخدمات مكتب صحة الدمرداش ومنطقة الوايلي. عن ماذا تبحث اليوم؟
        </div>
    </div>

    <div class="input-group">
        <input id="userInput" placeholder="اسأل عن المواليد، التطعيمات، أو الطوارئ..." autocomplete="off">
        <button onclick="handleSend()">إرسال</button>
    </div>

</div>

<script>
// ترتيب الخدمات وتوسيع الكلمات المفتاحية بناءً على الصورة والمطلوب
const services = {
    "دليل الخدمات الكامل": {
        keywords: ["دليل", "خدمات", "كل الخدمات", "قائمة", "الخدمات المتاحة"],
        link: "https://drive.google.com/file/d/1Vgg5HS4-OeyBYbDJtl7jxRPZU8C2r_8R/view?usp=drive_link",
        msg: "إليك الدليل الكامل لجميع الخدمات الصحية المتاحة بمنطقة الوايلي:"
    },
    "المستشفيات التابعة": {
        keywords: ["مستشفى", "مستشفيات", "قريب مني", "دكتور", "كشف", "عيادة"],
        link: "https://drive.google.com/file/d/1MELxONHRA8vLlynKibvUyzlb3aH-by5U/view?usp=drive_link",
        msg: "يمكنك العثور على أقرب مستشفى تابع لمنطقة الوايلي من الرابط التالي:"
    },
    "تسجيل المواليد": {
        keywords: ["ميلاد", "مولود", "نونو", "طفل", "شهادة ميلاد", "خلفنا", "بيبي", "رزقنا"],
        link: "https://drive.google.com/file/d/1bvjnKzITfH2p3HZO4e1V8aJ-f2zSxj7I/view?usp=drive_link",
        msg: "🎉 <b>ألف مبروك المولود الجديد!</b><br>جعل الله قدومه قدوم خير. إليك رابط إجراءات تسجيل الشهادة:"
    },
    "تسجيل الوفيات": {
        keywords: ["وفاة", "مات", "توفى", "الميت", "دفن", "وفاه", "تصريح دفن", "شهادة وفاة"],
        link: "https://drive.google.com/file/d/1SCFZrjN86Hv1j98A51VWm_vCHnXpyvKd/view?usp=sharing",
        msg: "🙏 <b>البقاء لله..</b><br>ساعدنا الله على تسهيل إجراءاتكم في هذا الوقت الصعب. إليك دليل الإجراءات:"
    },
    "تنمية الأسرة": {
        keywords: ["تنمية", "اسرة", "تنظيم", "منع حمل", "وسيلة", "نسا", "لولب"],
        link: "https://drive.google.com/file/d/1_IpgW0VgJwO9ngBtpCP1f2kHr33SUtGb/view?usp=drive_link",
        msg: "نحن نهتم بصحة الأسرة. يمكنك التعرف على خدمات تنظيم الأسرة وتنمية المجتمع هنا:"
    },
    "جدول التطعيمات": {
        keywords: ["تطعيم", "حقنة", "مصل", "شلل", "الصحة", "تطيم", "تطعيمات"],
        link: "https://drive.google.com/file/d/1ow8nktNnNExt09HKofaxeWNIMEwW9x5G/view?usp=drive_link",
        msg: "للحفاظ على صحة أطفالنا، إليك جدول التطعيمات الدورية ومواعيدها:"
    },
    "خدمات الطوارئ": {
        keywords: ["طوارئ", "اجازة", "عطلة", "جمعة", "عيد", "مش شغالين", "اروح فين"],
        link: "https://sites.google.com/view/wailyemergency", // ضع لينك المنصة المنفصلة هنا
        msg: "🚨 <b>خدمة طوارئ العطلات:</b><br>في حال كانت المكاتب في عطلة رسمية، يمكنك التوجه للمراكز البديلة الموضحة في المنصة التالية:"
    }
};

function similarity(a, b) {
    let matches = 0;
    for (let i = 0; i < Math.min(a.length, b.length); i++) {
        if (a[i] === b[i]) matches++;
    }
    return matches / Math.max(a.length, b.length);
}

function detectService(text) {
    text = text.toLowerCase();
    let words = text.split(" ");
    
    // فحص مباشر بالكلمات المفتاحية
    for (let service in services) {
        for (let key of services[service].keywords) {
            if (text.includes(key)) return service;
        }
    }
    
    // فحص بالتشابه لزيادة الذكاء
    let bestMatch = null;
    let bestScore = 0;
    for (let service in services) {
        for (let key of services[service].keywords) {
            for (let word of words) {
                let score = similarity(word, key);
                if (score > bestScore) {
                    bestScore = score;
                    bestMatch = service;
                }
            }
        }
    }
    return bestScore > 0.5 ? bestMatch : null;
}

function handleSend() {
    let input = document.getElementById("userInput");
    let text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";
    showTyping();

    setTimeout(() => {
        removeTyping();
        let serviceName = detectService(text);
        if (serviceName) {
            let s = services[serviceName];
            let response = `${s.msg}<br><a href="${s.link}" class="btn-link">فتح الخدمة: ${serviceName}</a>`;
            addMessage(response, "bot");
        } else {
            addMessage("🤔 عذراً، لم أفهم طلبك تماماً. هل تبحث عن (تطعيمات، تسجيل مواليد، أو خدمات الطوارئ)؟", "bot");
        }
    }, 1200);
}

function addMessage(text, type) {
    let chat = document.getElementById("chatArea");
    let div = document.createElement("div");
    div.className = "msg " + (type === "user" ? "user-msg" : "bot-msg");
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
    let chat = document.getElementById("chatArea");
    let div = document.createElement("div");
    div.id = "typing";
    div.className = "msg bot-msg typing";
    div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
    let t = document.getElementById("typing");
    if (t) t.remove();
}

document.getElementById("userInput").addEventListener("keydown", function(e){
    if (e.key === "Enter") {
        e.preventDefault();
        handleSend();
    }
});
</script>

</body>
</html>
